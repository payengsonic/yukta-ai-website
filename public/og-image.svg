<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#00c2a8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow circles -->
  <ellipse cx="200" cy="200" rx="300" ry="300" fill="rgba(79,70,229,0.15)" filter="url(#blur)"/>
  <ellipse cx="1000" cy="450" rx="250" ry="250" fill="rgba(0,194,168,0.12)" filter="url(#blur)"/>
  <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>

  <!-- Logo mark -->
  <rect x="100" y="200" width="80" height="80" rx="20" fill="url(#textGrad)"/>
  <text x="140" y="257" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle">Y</text>

  <!-- Brand name -->
  <text x="205" y="258" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="white">YUKTA AI</text>

  <!-- Tagline -->
  <text x="100" y="330" font-family="system-ui, sans-serif" font-size="26" fill="url(#textGrad)" font-weight="700">Shop Smarter. Save More.</text>

  <!-- Description -->
  <text x="100" y="380" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">AI-powered grocery price comparison across</text>
  <text x="100" y="408" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">Blinkit · Zepto · Instamart</text>

  <!-- Company -->
  <text x="100" y="520" font-family="system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)">by Udaan Spark AI · yukta.udaansparkai.com</text>

  <!-- Right: decorative store cards -->
  <g transform="translate(750, 160)">
    <rect width="160" height="80" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Blinkit</text>
    <text x="20" y="58" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">₹195</text>
  </g>
  <g transform="translate(940, 130)">
    <rect width="160" height="80" rx="14" fill="rgba(79,70,229,0.4)" stroke="rgba(79,70,229,0.6)" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Zepto</text>
    <text x="20" y="58" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">₹210</text>
  </g>
  <g transform="translate(840, 270)">
    <rect width="160" height="80" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Instamart</text>
    <text x="20" y="58" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">₹205</text>
  </g>

  <!-- Savings badge -->
  <g transform="translate(845, 390)">
    <rect width="180" height="44" rx="22" fill="url(#textGrad)"/>
    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Save ₹247 today</text>
  </g>
</svg>
